apiVersion: apps/v1
kind: Deployment
metadata:
  name: ia-orquestador
  labels:
    app: ia-orquestador
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ia-orquestador
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ia-orquestador
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: orchestrator
          image: ghcr.io/thiscloud/ia-orquestador:latest
          imagePullPolicy: Always
          args:
            - -transport=http
            - -http-addr=:8080
            - -db-driver=postgres
            - -db-dsn=$(DATABASE_URL)
            - -memory-url=$(MEMORY_URL)
            - -project=$(MEMORY_PROJECT)
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ia-orquestador-secret
                  key: database-url
            - name: MEMORY_URL
              valueFrom:
                configMapKeyRef:
                  name: ia-orquestador-config
                  key: memory-url
            - name: MEMORY_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: ia-orquestador-config
                  key: memory-project
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
